<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centurion Project Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f6f3;
    color: #1a1a1a;
    padding: 24px;
    min-height: 100vh;
  }

  .hub-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .hub-title {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hub-sub {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  .updated {
    font-size: 11px;
    color: #aaa;
    margin-top: 4px;
  }

  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e5e5e5;
  }

  .col-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .col-count {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 600;
  }

  .col-count.red { background: #fde8e8; color: #c0392b; }
  .col-count.green { background: #e6f4d7; color: #3a6e11; }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover {
    border-color: #bbb;
    background: #fafafa;
  }

  .card.todo { border-left: 3px solid #e74c3c; }
  .card.good { border-left: 3px solid #639922; }

  .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .dot.todo { background: #fde8e8; }
  .dot.good { background: #e6f4d7; }

  .info { flex: 1; min-width: 0; }

  .name {
    font-size: 12px;
    font-weight: 500;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta {
    font-size: 11px;
    color: #888;
    margin-top: 1px;
  }

  .arr { color: #bbb; font-size: 14px; flex-shrink: 0; }

  .empty {
    text-align: center;
    padding: 2rem 1rem;
    color: #aaa;
    font-size: 12px;
    border: 1px dashed #e5e5e5;
    border-radius: 8px;
  }

  @media (max-width: 600px) {
    .cols { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="hub-header">
  <div>
    <div class="hub-title">🏗️ Centurion Project Hub</div>
    <div class="hub-sub">Active projects — click any row to open in Notion</div>
    <div class="updated" id="lastUpdated"></div>
  </div>
</div>

<div class="cols">
  <div>
    <div class="col-header">
      <span style="font-size:15px;">🔴</span>
      <span class="col-title">Needs action</span>
      <span class="col-count red" id="cTodo"></span>
    </div>
    <div class="cards" id="colTodo"></div>
  </div>
  <div>
    <div class="col-header">
      <span style="font-size:15px;">🟢</span>
      <span class="col-title">All clear</span>
      <span class="col-count green" id="cGood"></span>
    </div>
    <div class="cards" id="colGood"></div>
  </div>
</div>

<script>
const projects = [
  { name: "25-1065MB (7131 Stride Ave - Burnaby - RE)",         todo: "todo", pm: "Mike Beaton",    url: "https://www.notion.so/36f4ccfb292e8140ab78c65a1567665b" },
  { name: "25-1114BR (509 Carnarvon St - New West - RE)",       todo: "good", pm: "Brad Rowbotham", url: "https://www.notion.so/36d4ccfb292e806ebda0c610ef67db1c" },
  { name: "25-301MB (7680 Columbia St - Vancouver - RE)",       todo: "good", pm: "Mike Beaton",    url: "https://www.notion.so/36e4ccfb292e81f88641c78852193b3a" },
  { name: "25-073PC (37881 Cleveland Ave - Squamish - RE)",     todo: "good", pm: "Phil Cheung",    url: "https://www.notion.so/36e4ccfb292e8121935ccdebac3aaaec" },
  { name: "25-1072BR (10838 Whalley Blvd - Surrey - RE2)",      todo: "good", pm: "Brad Rowbotham", url: "https://www.notion.so/36e4ccfb292e81449962ea25607604cb" },
  { name: "25-1023MB (1030 East Pender - Vancouver - EM3)",     todo: "good", pm: "Mike Beaton",    url: "https://www.notion.so/36d4ccfb292e80bd964ee0eaccc47ee6" },
  { name: "26-308MB (5th Floor - 22 East 5th Ave - RE)",        todo: "good", pm: "Mike Beaton",    url: "https://www.notion.so/36e4ccfb292e80a69787f86ca0076f84" },
  { name: "25-849MB (7156 144 St - Surrey - RE)",               todo: "good", pm: "Mike Beaton",    url: "https://www.notion.so/36d4ccfb292e80238a78e9b0b13c7b57" },
  { name: "26-247BR (2181 E 7th Ave - Vancouver - PH1)",        todo: "good", pm: "Brad Rowbotham", url: "https://www.notion.so/36e4ccfb292e813bbf3ed4654ad92c87" },
  { name: "26-326BR (695 E 19th Ave - Vancouver - RE)",         todo: "good", pm: "Brad Rowbotham", url: "https://www.notion.so/36e4ccfb292e815ab1f1dd61c8bdb082" },
  { name: "26-222MB (32700 7th Ave - Mission - EM)",            todo: "good", pm: "Mike Beaton",    url: "https://www.notion.so/36d4ccfb292e801eb891f6a8a14a7ff0" },
];

function card(p) {
  const cls = p.todo === 'todo' ? 'todo' : 'good';
  const icon = p.todo === 'todo' ? '🔴' : '🟢';
  return `<a class="card ${cls}" href="${p.url}" target="_blank" rel="noopener">
    <div class="dot ${cls}">${icon}</div>
    <div class="info">
      <div class="name">${p.name}</div>
      <div class="meta">👤 ${p.pm}</div>
    </div>
    <span class="arr">→</span>
  </a>`;
}

const todo = projects.filter(p => p.todo === 'todo').sort((a,b) => a.name.localeCompare(b.name));
const good = projects.filter(p => p.todo === 'good').sort((a,b) => a.name.localeCompare(b.name));

document.getElementById('cTodo').textContent = todo.length;
document.getElementById('cGood').textContent = good.length;

document.getElementById('colTodo').innerHTML = todo.length
  ? todo.map(card).join('')
  : '<div class="empty">🎉 All clear — no action needed</div>';

document.getElementById('colGood').innerHTML = good.length
  ? good.map(card).join('')
  : '<div class="empty">No projects here</div>';

document.getElementById('lastUpdated').textContent = 'Last synced: May 29, 2026';
</script>
</body>
</html>
